{% extends "base.html" %}
{% block title %}Upload Book — Digital Library{% endblock %}

{% block content %}
<section>
    <h1>Upload a New Book</h1>
    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data" class="form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required>

        <label for="author">Author</label>
        <input type="text" id="author" name="author" required>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" placeholder="e.g. Fiction, Science, History">

        <label for="book_file">PDF File</label>
        <input type="file" id="book_file" name="book_file" accept="application/pdf" required>

        <button type="submit" class="btn">Upload</button>
    </form>
</section>
{% endblock %}
